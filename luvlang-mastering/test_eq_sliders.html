<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EQ Slider Test</title>
</head>
<body>
    <h1>EQ Slider Diagnostic Test</h1>

    <div>
        <label>Sub (60Hz): <span id="eqSubValue">0.0 dB</span></label>
        <input type="range" id="eqSubSlider" min="-6" max="6" step="0.5" value="0">
    </div>

    <div>
        <label>Bass (250Hz): <span id="eqBassValue">0.0 dB</span></label>
        <input type="range" id="eqBassSlider" min="-6" max="6" step="0.5" value="0">
    </div>

    <div id="console-output" style="background: #f0f0f0; padding: 20px; margin-top: 20px; font-family: monospace;">
        <h2>Console Output:</h2>
        <div id="log"></div>
    </div>

    <script>
        const log = document.getElementById('log');

        function logMessage(msg) {
            const p = document.createElement('p');
            p.textContent = new Date().toLocaleTimeString() + ': ' + msg;
            log.appendChild(p);
            console.log(msg);
        }

        logMessage('🎬 Script starting...');

        // Check if elements exist
        const eqSubSlider = document.getElementById('eqSubSlider');
        const eqSubValue = document.getElementById('eqSubValue');
        const eqBassSlider = document.getElementById('eqBassSlider');
        const eqBassValue = document.getElementById('eqBassValue');

        logMessage('eqSubSlider exists: ' + (eqSubSlider ? 'YES' : 'NO'));
        logMessage('eqSubValue exists: ' + (eqSubValue ? 'YES' : 'NO'));
        logMessage('eqBassSlider exists: ' + (eqBassSlider ? 'YES' : 'NO'));
        logMessage('eqBassValue exists: ' + (eqBassValue ? 'YES' : 'NO'));

        // Add event listener for Sub
        if (eqSubSlider && eqSubValue) {
            eqSubSlider.addEventListener('input', () => {
                const val = parseFloat(eqSubSlider.value);
                eqSubValue.textContent = (val >= 0 ? '+' : '') + val.toFixed(1) + ' dB';
                logMessage('🎚️ Sub slider moved to: ' + val.toFixed(1) + ' dB');
            });
            logMessage('✅ Sub event listener added');
        } else {
            logMessage('❌ Sub event listener NOT added - elements missing');
        }

        // Add event listener for Bass
        if (eqBassSlider && eqBassValue) {
            eqBassSlider.addEventListener('input', () => {
                const val = parseFloat(eqBassSlider.value);
                eqBassValue.textContent = (val >= 0 ? '+' : '') + val.toFixed(1) + ' dB';
                logMessage('🎚️ Bass slider moved to: ' + val.toFixed(1) + ' dB');
            });
            logMessage('✅ Bass event listener added');
        } else {
            logMessage('❌ Bass event listener NOT added - elements missing');
        }

        logMessage('🎬 Script complete!');
    </script>
</body>
</html>
